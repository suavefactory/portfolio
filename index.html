<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Rui Simões</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Cursor ── */
    * { cursor: none !important; }

    #cursor {
      position: fixed;
      top: 0; left: 0;
      width: 18px; height: 18px;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      will-change: left, top;
    }

    #cursor::before,
    #cursor::after {
      content: '';
      position: absolute;
      background: #fff;
    }

    /* horizontal bar */
    #cursor::before {
      width: 100%; height: 1px;
      top: 50%; left: 0;
      transform: translateY(-50%);
    }

    /* vertical bar */
    #cursor::after {
      width: 1px; height: 100%;
      left: 50%; top: 0;
      transform: translateX(-50%);
    }

    /* ── Grain overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9000;
      opacity: 0.055;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── Base ── */
    html { height: 100%; }

    body {
      background: #e8e8e8;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 11.5px;
      color: #000;
      line-height: 1;
      min-height: 100%;
    }

    /* ── Header ── */
    header {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: end;
      padding: 10px 8px 8px;
      border-bottom: 1px solid #000;
    }

    .header-name {
      font-size: 11.5px;
      letter-spacing: 0;
    }

    .header-role {
      text-align: center;
      font-size: 11.5px;
      opacity: 0.5;
    }

    .header-counter {
      text-align: right;
      font-size: 11.5px;
      opacity: 0.5;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }

    /* ── Image strip ── */
    .image-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-bottom: 1px solid #000;
    }

    .image-cell {
      position: relative;
      aspect-ratio: 4 / 3;
      background: #888;
      border-right: 1px solid #000;
      overflow: hidden;
    }

    .image-cell:last-child { border-right: none; }


    .image-cell img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 14px;
    }

    .image-cell img.cover {
      object-fit: cover;
      padding: 0;
    }

    /* wipe-in animation */
    @keyframes wipe {
      from { clip-path: inset(0 100% 0 0); }
      to   { clip-path: inset(0 0% 0 0); }
    }

    .image-cell img.wipe {
      animation: wipe 0.18s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .image-cell .placeholder {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        #d4d4d4,
        #d4d4d4 1px,
        #dcdcdc 1px,
        #dcdcdc 8px
      );
    }

    /* ── Project list ── */
    /* ── Ticker ── */
    .ticker {
      overflow: hidden;
      background: #c8ff00;
      border-bottom: 1px solid #000;
      height: 22px;
      display: flex;
      align-items: center;
    }

    .ticker-track {
      display: flex;
      white-space: nowrap;
      will-change: transform;
      animation: ticker-scroll 30s linear infinite;
      transform: translateZ(0);
    }

    .ticker-track span {
      font-size: 12px;
      letter-spacing: 0.01em;
      padding-right: 60px;
      color: #000;
    }

    @keyframes ticker-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── Column headers ── */
    .col-headers {
      display: grid;
      grid-template-columns: 28px 170px 1fr 220px 40px 68px;
      padding: 6px 8px 4px;
      gap: 0 10px;
      border-bottom: 1px solid #000;
      text-transform: uppercase;
      font-size: 9px;
      letter-spacing: 0.08em;
      opacity: 0.4;
    }

    .col-headers span:last-child { text-align: right; }

    /* ── Float window ── */
    .float-window {
      position: fixed;
      top: 80px; left: 50%;
      transform: translateX(-50%);
      width: 680px;
      height: 420px;
      min-width: 280px;
      min-height: 180px;
      background: #1c1c1e;
      border-radius: 10px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.55), 0 0 0 0.5px rgba(255,255,255,0.08);
      z-index: 8000;
      overflow: hidden;
      resize: both;
      display: none;
    }

    .float-window.visible { display: flex; flex-direction: column; }

    .float-titlebar {
      flex-shrink: 0;
      height: 36px;
      background: #2c2c2e;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      cursor: move;
      user-select: none;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }

    .float-dots { display: flex; gap: 7px; }

    .float-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
    }

    .float-dot.close  { background: #ff5f57; }
    .float-dot.min    { background: #ffbd2e; }
    .float-dot.max    { background: #28ca41; }

    .float-title {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.02em;
      margin-right: 50px; /* balance the dots */
    }

    .float-body {
      flex: 1;
      overflow: hidden;
    }

    .float-body iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* block iframe pointer events while dragging */
    .float-window.dragging .float-body iframe { pointer-events: none; }

    /* ── Project table ── */
    .project-list { width: 100%; }

    .project-row {
      display: grid;
      grid-template-columns: 28px 170px 1fr 220px 40px 68px;
      padding: 4px 8px 3px;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      gap: 0 10px;
      align-items: baseline;
      user-select: none;
    }

    .project-row.active,
    .project-row.locked {
      background: #0055ff;
      color: #fff;
    }

    .col-num {
      opacity: 0.3;
      font-variant-numeric: tabular-nums;
      font-size: 10px;
      padding-top: 1px;
    }

    .project-row:hover .col-num,
    .project-row.active .col-num {
      opacity: 0.5;
    }

    .col-year {
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .col-tag {
      opacity: 0.45;
      font-size: 10px;
      letter-spacing: 0.04em;
    }

    .project-row:hover .col-tag,
    .project-row.active .col-tag {
      opacity: 0.7;
    }

    .col-tag a {
      color: inherit;
      text-decoration: none;
    }

    .col-tag a:hover {
      text-decoration: underline;
    }

    /* ── 3D Name ── */
    #name-3d-wrap {
      position: fixed;
      top: -12px;
      left: -8px;
      z-index: 500;
      pointer-events: none;
      perspective: 600px;
    }

    #name-3d {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 900;
      font-size: clamp(36px, 4.5vw, 62px);
      line-height: 0.88;
      white-space: nowrap;
      transform-style: preserve-3d;
      animation: spin3d 6s linear infinite;
      transform-origin: 50% 50%;
    }

    .name-layer {
      position: absolute;
      top: 0; left: 0;
      color: #000;
      white-space: nowrap;
    }

    .name-layer:first-child { position: relative; }

    @keyframes spin3d {
      from { transform: rotateY(0deg); }
      to   { transform: rotateY(360deg); }
    }

    /* ── Footer ── */
    footer {
      display: flex;
      justify-content: space-between;
      padding: 8px 8px;
      border-top: 1px solid rgba(0,0,0,0.15);
      margin-top: 2px;
      opacity: 0.4;
      font-size: 10.5px;
    }

    #clock {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }
  </style>
</head>

    // ── Float window ─────────────────────────────────────────────────
    const floatWindow   = document.getElementById("floatWindow");
    const floatTitlebar = document.getElementById("floatTitlebar");
    const floatIframe   = document.getElementById("floatIframe");
    const floatTitle    = document.getElementById("floatTitle");
    const floatClose    = document.getElementById("floatClose");

    function vimeoEmbed(url) {
      const m = url.match(/vimeo\.com\/(\d+)/);
      return m ? `https://player.vimeo.com/video/${m[1]}?autoplay=1&color=ffffff&title=0&byline=0&portrait=0` : null;
    }

    function openFloat(url, label) {
      const embed = vimeoEmbed(url);
      if (!embed) { window.open(url, "_blank"); return; }
      floatIframe.src = embed;
      floatTitle.textContent = label || "Vimeo";
      floatWindow.classList.add("visible");
      // reset position to center
      floatWindow.style.transform = "translateX(-50%)";
      floatWindow.style.left = "50%";
      floatWindow.style.top  = "80px";
    }

    floatClose.addEventListener("click", () => {
      floatWindow.classList.remove("visible");
      floatIframe.src = ""; // stop video
    });

    // drag
    let drag = false, dragX = 0, dragY = 0;

    floatTitlebar.addEventListener("mousedown", e => {
      drag = true;
      floatWindow.classList.add("dragging");
      const rect = floatWindow.getBoundingClientRect();
      dragX = e.clientX - rect.left;
      dragY = e.clientY - rect.top;
      floatWindow.style.transform = "none";
      floatWindow.style.left = rect.left + "px";
      floatWindow.style.top  = rect.top  + "px";
    });

    document.addEventListener("mousemove", e => {
      if (!drag) return;
      floatWindow.style.left = (e.clientX - dragX) + "px";
      floatWindow.style.top  = (e.clientY - dragY) + "px";
    });

    document.addEventListener("mouseup", () => {
      drag = false;
      floatWindow.classList.remove("dragging");
    });

    // ── DOM refs ──────────────────────────────────────────────────────
    const list        = document.getElementById("projectList");
    const strip       = document.getElementById("imageStrip");
    const cells       = strip.querySelectorAll(".image-cell");
    const counterEl   = document.getElementById("counterEl");
    const totalEl     = document.getElementById("totalEl");
    const cursor      = document.getElementById("cursor");
    const tickerTrack = document.getElementById("tickerTrack");
    const tickerText  = document.getElementById("tickerText");
    const tickerClone = document.getElementById("tickerTextClone");

    const DEFAULT_TICKER = "Rui Simões — AI Filmmaker, Designer, Editor — Selected Work 2022–2025 — ";

    let currentTicker = "";
    const PX_PER_SEC = 80;

    function setTicker(text) {
      if (text === currentTicker) return;
      currentTicker = text;
      const repeated = (text + " — ").repeat(6);
      tickerText.textContent  = repeated;
      tickerClone.textContent = repeated;
      tickerTrack.style.animation = "none";
      tickerTrack.offsetWidth; // force reflow
      const duration = tickerText.offsetWidth / PX_PER_SEC;
      tickerTrack.style.animation = `ticker-scroll ${duration}s linear infinite`;
    }

    setTicker(DEFAULT_TICKER);

    totalEl.textContent = String(projects.length).padStart(2, "0");

    // ── Custom cursor (RAF-throttled) ─────────────────────────────────
    let cx = 0, cy = 0, cursorPending = false;
    document.addEventListener("mousemove", e => {
      cx = e.clientX; cy = e.clientY;
      if (!cursorPending) {
        cursorPending = true;
        requestAnimationFrame(() => {
          cursor.style.left = cx + "px";
          cursor.style.top  = cy + "px";
          cursorPending = false;
        });
      }
    });

    // ── Clock ─────────────────────────────────────────────────────────
    function tick() {
      const now = new Date();
      const hh  = String(now.getHours()).padStart(2, "0");
      const mm  = String(now.getMinutes()).padStart(2, "0");
      const ss  = String(now.getSeconds()).padStart(2, "0");
      document.getElementById("clock").textContent = `${hh}:${mm}:${ss}`;
    }
    tick();
    setInterval(tick, 1000);

    // ── Media switching ───────────────────────────────────────────────
    const VIDEO_EXT = /\.(mp4|mov|webm|ogg|MOV|MP4)$/i;

    // encode each path segment so special chars & spaces work on web servers
    function encodePath(path) {
      return path.split('/').map(encodeURIComponent).join('/');
    }

    // ── Preload all images ────────────────────────────────────────────
    projects.forEach(p => {
      (p.media || []).forEach(src => {
        if (!VIDEO_EXT.test(src)) { const img = new Image(); img.src = encodePath(src); }
      });
    });
    let cycleInterval = null;

    const FRAME_MS = (3 / 24) * 1000; // 3 frames at 24fps in milliseconds
    let playTimers = [];
    const cellSrc = Array(5).fill(null); // cached src per cell

    function renderFrame(media, cover, offset, bg) {
      playTimers.forEach(t => clearTimeout(t));
      playTimers = [];

      const srcs = Array.from({ length: 5 }, (_, i) =>
        media.length ? media[(offset + i) % media.length] : null
      );
      const uniqueVideos = [...new Set(srcs.filter(s => s && VIDEO_EXT.test(s)))];
      const singleVideo  = uniqueVideos.length === 1 && srcs.every(s => !s || s === uniqueVideos[0]);

      cells.forEach((cell, i) => {
        const src = srcs[i] || null;

        // skip if same src already showing
        if (src === cellSrc[i]) return;
        cellSrc[i] = src;

        cell.innerHTML = "";
        cell.style.background = bg || "";

        if (src && VIDEO_EXT.test(src)) {
          const v = document.createElement("video");
          v.src = encodePath(src);
          v.muted = true; v.loop = true; v.playsInline = true;
          v.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:cover;";
          cell.appendChild(v);
          if (singleVideo) {
            const t = setTimeout(() => v.play(), i * FRAME_MS);
            playTimers.push(t);
          } else {
            v.play();
          }
        } else if (src) {
          const img = document.createElement("img");
          img.src = encodePath(src);
          img.alt = "";
          if (cover) img.classList.add("cover");
          if (bg) { img.style.padding = "0"; img.style.objectFit = "contain"; }
          cell.appendChild(img);
        } else {
          const ph = document.createElement("div");
          ph.className = "placeholder";
          cell.appendChild(ph);
        }
      });
    }

    function setImages(media, cover, bg) {
      clearInterval(cycleInterval);
      if (!media || !media.length) { renderFrame([], cover, 0, bg); return; }

      renderFrame(media, cover, 0, bg);

      if (media.length > 5) {
        let offset = 0;
        cycleInterval = setInterval(() => {
          offset = (offset + 1) % media.length;
          renderFrame(media, cover, offset, bg);
        }, 1000);
      }
    }

    // ── Render rows ───────────────────────────────────────────────────
    let activeRow    = null;
    let lockedRow    = null;
    let hoverTimer   = null;

    function activateProject(p, row, num) {
      if (activeRow) activeRow.classList.remove("active");
      activeRow = row;
      row.classList.add("active");
      setImages(p.media, p.cover, p.bg);
      if (p.description) setTicker(p.description);
      counterEl.innerHTML = `${num}&nbsp;/&nbsp;<span>${String(projects.length).padStart(2, "0")}</span>`;
    }

    projects.forEach((p, idx) => {
      const row = document.createElement("div");
      row.className = "project-row";

      const num = String(idx + 1).padStart(2, "0");
      const tagHtml = p.link
        ? `<a href="${p.link}" data-label="${p.client} — ${p.title}">${p.tag || "↗"}</a>`
        : (p.tag || "");

      row.innerHTML = `
        <span class="col-num">${num}</span>
        <span class="col-client">${p.client}</span>
        <span class="col-title">${p.title}</span>
        <span class="col-disc">${p.disciplines}</span>
        <span class="col-tag">${tagHtml}</span>
        <span class="col-year">${p.year}</span>
      `;

      row.addEventListener("mouseenter", () => {
        if (lockedRow) return;
        clearTimeout(hoverTimer);
        hoverTimer = setTimeout(() => activateProject(p, row, num), 50);
      });

      row.addEventListener("mouseleave", () => {
        clearTimeout(hoverTimer);
        if (!lockedRow && activeRow === row) {
          row.classList.remove("active");
          activeRow = null;
        }
      });

      row.addEventListener("click", (e) => {
        if (e.target.tagName === "A") {
          e.preventDefault();
          openFloat(e.target.href, e.target.dataset.label);
          return;
        }
        if (lockedRow === row) {
          // unlock
          lockedRow = null;
          row.classList.remove("locked");
        } else {
          // lock
          if (lockedRow) lockedRow.classList.remove("locked");
          lockedRow = row;
          row.classList.add("locked");
          activateProject(p, row, num);
        }
      });

      list.appendChild(row);
    });

    // reset on leave — skip if locked
    list.addEventListener("mouseleave", () => {
      if (lockedRow) return;
      clearInterval(cycleInterval);
      if (activeRow) { activeRow.classList.remove("active"); activeRow = null; }
      cells.forEach(c => { c.style.background = ""; });
      counterEl.innerHTML = `—&nbsp;/&nbsp;<span>${String(projects.length).padStart(2, "0")}</span>`;
      setTicker(DEFAULT_TICKER);
    });
  </script>

</body>
</html>
